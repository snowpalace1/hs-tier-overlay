<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하스스톤 채팅 위젯</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: transparent; overflow: hidden; margin: 0; padding: 0; }
        @keyframes glint { 0% { left: -60%; } 55%, 100% { left: 130%; } }
        .badge { position: relative; clip-path: inset(0 round 0.25rem); text-shadow: 0 0 1px rgba(255,255,255,0.5); }
        .shiny::after { content: ''; position: absolute; top: 0; left: -60%; width: 40%; height: 100%; background: linear-gradient(100deg, transparent, rgba(255, 255, 255, 0.85), transparent); transform: skewX(-20deg); animation: glint 2.6s ease-in-out infinite; }
        .chat-row { opacity: 1; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.8)); }
    </style>
</head>
<body class="h-screen w-full flex flex-col justify-end p-4">
    <div id="chat-container" class="flex flex-col space-y-1.5 w-full max-h-full"></div>
    <script>
        const WS_URL = "wss://hs-chzzk-tier-api.duckdns.org/ws/overlay";
        const chatContainer = document.getElementById('chat-container');

        function connect() {
            const ws = new WebSocket(WS_URL);
            ws.onopen = () => console.log("✅ OBS 위젯 서버 연결 성공");
            ws.onmessage = (event) => appendMessage(JSON.parse(event.data));
            ws.onclose = () => setTimeout(connect, 3000);
        }

        function appendMessage(data) {
            const row = document.createElement('div');
            row.className = 'chat-row break-words text-white text-[15px] leading-relaxed';

            let badgeHtml = '';
            
            if (data.rank_data) {
                let rankNum = data.rank_data.rank;
                if (rankNum === 0) {
                    // 연동 O, 비전설 (기존 회색 유지)
                    badgeHtml = `<span class="badge inline-block px-1.5 py-0.5 font-bold text-white text-[13px] align-middle mr-1" style="background-color: #6b7280;">비전설</span>`;
                } else {
                    // 연동 O, 전설 등수 세분화 매핑
                    let bgColor = '#78350f'; // 기본값: 5000등 바깥 (갈색/동색)
                    let fontColor = '#ffffff';
                    let shinyClass = '';

                    if (rankNum <= 10) {
                        bgColor = '#38bdf8'; // 10등 이내: 하늘색 
                        fontColor = '#000000';
                        shinyClass = 'shiny'; // 반짝이 유지
                    } else if (rankNum <= 100) {
                        bgColor = '#ef4444'; // 100등 이내: 빨간색
                        fontColor = '#000000';
                        shinyClass = 'shiny'; // 반짝이 유지
                    } else if (rankNum <= 500) {
                        bgColor = '#a855f7'; // 500등 이내: 보라색
                    } else if (rankNum <= 1000) {
                        bgColor = '#3b82f6'; // 1000등 이내: 파란색
                    } else if (rankNum <= 2000) {
                        bgColor = '#22c55e'; // 2000등 이내: 초록색
                        fontColor = '#000000';
                    } else if (rankNum <= 3000) {
                        bgColor = '#eab308'; // 3000등 이내: 노란색
                        fontColor = '#000000';
                    } else if (rankNum <= 5000) {
                        bgColor = '#cbd5e1'; // 5000등 이내: 은색
                        fontColor = '#000000';
                    }

                    badgeHtml = `<span class="badge ${shinyClass} inline-block px-1.5 py-0.5 font-bold text-[13px] align-middle mr-1" style="background-color: ${bgColor}; color: ${fontColor};">${data.rank_data.region} ${rankNum}</span>`;
                }
            } 

            row.innerHTML = `
                ${badgeHtml}
                <span class="font-bold text-gray-200 mr-1 align-middle">${data.nickname}</span>
                <span class="align-middle">${data.msg}</span>
            `;
            chatContainer.appendChild(row);
            row.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }
        connect();
    </script>
</body>
</html>
