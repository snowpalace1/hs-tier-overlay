<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하스스톤 채팅 위젯</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: transparent; overflow: hidden; margin: 0; padding: 0; }
        @keyframes glint { 0% { left: -60%; } 55%, 100% { left: 130%; } }
        .badge { position: relative; clip-path: inset(0 round 0.25rem); text-shadow: 0 0 1px rgba(255,255,255,0.5); }
        .shiny::after { content: ''; position: absolute; top: 0; left: -60%; width: 40%; height: 100%; background: linear-gradient(100deg, transparent, rgba(255, 255, 255, 0.85), transparent); transform: skewX(-20deg); animation: glint 2.6s ease-in-out infinite; }
        .chat-row { opacity: 1; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.8)); }
    </style>
</head>
<body class="h-screen w-full flex flex-col justify-end p-4">
    <div id="chat-container" class="flex flex-col space-y-1.5 w-full max-h-full"></div>
    <script>
        const chatContainer = document.getElementById('chat-container');
        const urlParams = new URLSearchParams(window.location.search);
        const channelId = urlParams.get('channelId') || "327688e7f4894b6daa97a29ab3e85495"; 
        
        const rankCache = {};
        const inFlightRequests = {};

        async function getRankData(userIdHash) {
            if (rankCache[userIdHash] !== undefined) return rankCache[userIdHash];
            if (inFlightRequests[userIdHash]) return await inFlightRequests[userIdHash];

            inFlightRequests[userIdHash] = fetch(`https://hs-chzzk-tier-api.duckdns.org/api/rank/${userIdHash}`)
                .then(res => res.json())
                .then(json => {
                    const data = json.status === "success" ? json : null;
                    rankCache[userIdHash] = data;
                    delete inFlightRequests[userIdHash];
                    return data;
                })
                .catch(() => { delete inFlightRequests[userIdHash]; return null; });
            return await inFlightRequests[userIdHash];
        }

        async function connectChzzk() {
            try {
                const authRes = await fetch(`https://hs-chzzk-tier-api.duckdns.org/api/chat-auth/${channelId}`);
                const authData = await authRes.json();
                if (authData.status !== "success") {
                    setTimeout(connectChzzk, 5000);
                    return;
                }

                const ws = new WebSocket("wss://kr-ss1.chat.naver.com/chat");
                
                ws.onopen = () => {
                    ws.send(JSON.stringify({
                        ver: "2", cmd: 100, svcid: "game", cid: authData.chatChannelId,
                        bdy: { uid: null, devType: 2001, accTkn: authData.accessToken, auth: "READ" }, tid: 1
                    }));
                };

                ws.onmessage = async (event) => {
                    const data = JSON.parse(event.data);
                    if (data.cmd === 0) {
                        ws.send(JSON.stringify({ ver: "2", cmd: 10000 }));
                    } else if (data.cmd === 93101) {
                        for (const chat of data.bdy) {
                            const profile = chat.profile ? JSON.parse(chat.profile) : {};
                            const userIdHash = profile.userIdHash;
                            const msgText = chat.msg || "";
                            const nickname = profile.nickname || "알 수 없음";

                            if (userIdHash && msgText) {
                                const rankData = await getRankData(userIdHash);
                                renderMessage(nickname, msgText, rankData);
                            }
                        }
                    }
                };

                ws.onclose = () => setTimeout(connectChzzk, 3000);
            } catch (error) {
                setTimeout(connectChzzk, 5000);
            }
        }

        function renderMessage(nickname, msg, rankData) {
            const row = document.createElement('div');
            row.className = 'chat-row break-words text-white text-[15px] leading-relaxed';

            let badgeHtml = '';
            if (rankData) {
                let rankNum = rankData.rank;
                if (rankNum === 0) {
                    badgeHtml = `<span class="badge inline-block px-1.5 py-0.5 font-bold text-white text-[13px] align-middle mr-1" style="background-color: #6b7280;">비전설</span>`;
                } else {
                    let bgColor = '#78350f', fontColor = '#ffffff', shinyClass = '';
                    if (rankNum <= 10) { bgColor = '#38bdf8'; fontColor = '#000000'; shinyClass = 'shiny'; }
                    else if (rankNum <= 100) { bgColor = '#ef4444'; fontColor = '#000000'; shinyClass = 'shiny'; }
                    else if (rankNum <= 500) { bgColor = '#a855f7'; }
                    else if (rankNum <= 1000) { bgColor = '#3b82f6'; }
                    else if (rankNum <= 2000) { bgColor = '#22c55e'; fontColor = '#000000'; }
                    else if (rankNum <= 3000) { bgColor = '#eab308'; fontColor = '#000000'; }
                    else if (rankNum <= 5000) { bgColor = '#cbd5e1'; fontColor = '#000000'; }
                    badgeHtml = `<span class="badge ${shinyClass} inline-block px-1.5 py-0.5 font-bold text-[13px] align-middle mr-1" style="background-color: ${bgColor}; color: ${fontColor};">${rankData.region} ${rankNum}</span>`;
                }
            }
            row.innerHTML = `${badgeHtml}<span class="font-bold text-gray-200 mr-1 align-middle">${nickname}</span><span class="align-middle">${msg}</span>`;
            chatContainer.appendChild(row);
            row.scrollIntoView({ behavior: 'auto', block: 'end' });
        }
        
        connectChzzk();
    </script>
</body>
</html>
