<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하스스톤 티어 인증</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg text-center max-w-md w-full">
        <h1 class="text-3xl font-bold mb-4 text-blue-400">하스스톤 티어 인증</h1>
        <p class="text-gray-400 mb-8">치지직 방송 오버레이 연동을 위해<br>두 계정을 순서대로 로그인해 주세요.</p>
        
        <button id="chzzkLoginBtn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded mb-4 transition duration-300">
            1. 치지직 연동하기
        </button>
        
        <div id="resultArea" class="mt-4 mb-4 hidden bg-gray-700 p-4 rounded-lg">
            <p id="chzzkResult" class="text-lg text-green-400 font-bold hidden">✅ 치지직: <span id="chzzkDisplay" class="text-white"></span></p>
        </div>

        <button id="bnetLoginBtn" style="display: none;" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition duration-300">
            2. 배틀넷 연동하기
        </button>

        <div id="bnetResultArea" class="mt-4 hidden bg-gray-700 p-4 rounded-lg">
            <p id="bnetResult" class="text-lg text-blue-400 font-bold hidden">✅ 배틀넷: <span id="battletagDisplay" class="text-white"></span></p>
        </div>
        
        <p class="mt-6 text-sm text-gray-500">인증 후 치지직 채팅을 치면 티어가 표시됩니다!</p>
    </div>

    <script>
        const REDIRECT_URI = encodeURIComponent('https://snowpalace1.github.io/hs-tier-overlay/');
        
        document.getElementById('chzzkLoginBtn').addEventListener('click', function() {
            const chzzkClientId = '37cbbed2-f852-4d79-978f-03234545ee2a'; 
            const stateString = Math.random().toString(36).substring(2, 15);
            localStorage.setItem('login_provider', 'chzzk');
            const chzzkAuthUrl = `https://chzzk.naver.com/account-interlock?response_type=code&clientId=${chzzkClientId}&redirectUri=${REDIRECT_URI}&state=${stateString}`;
            window.location.href = chzzkAuthUrl;
        });

        document.getElementById('bnetLoginBtn').addEventListener('click', function() {
            const bnetClientId = '4a49c5289b9a42aba85056bb55c1154c'; 
            const stateString = Math.random().toString(36).substring(2, 15);
            localStorage.setItem('login_provider', 'bnet');
            const bnetAuthUrl = `https://oauth.battle.net/authorize?client_id=${bnetClientId}&redirect_uri=${REDIRECT_URI}&response_type=code&scope=openid&state=${stateString}`;
            window.location.href = bnetAuthUrl;
        });

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const provider = localStorage.getItem('login_provider');
            
            if (code) {
                window.history.replaceState(null, '', window.location.pathname);
            }
            
            const savedChzzk = localStorage.getItem('chzzk_name');
            const savedBnet = localStorage.getItem('bnet_name');
            
            if (savedChzzk) {
                document.getElementById('chzzkLoginBtn').style.display = 'none';
                document.getElementById('resultArea').classList.remove('hidden');
                document.getElementById('chzzkResult').classList.remove('hidden');
                document.getElementById('chzzkDisplay').innerText = savedChzzk;
                
                if (!savedBnet) {
                    document.getElementById('bnetLoginBtn').style.display = 'block';
                }
            }
            
            if (savedBnet) {
                document.getElementById('bnetLoginBtn').style.display = 'none';
                document.getElementById('bnetResultArea').classList.remove('hidden');
                document.getElementById('bnetResult').classList.remove('hidden');
                document.getElementById('battletagDisplay').innerText = savedBnet;
            }
            
            if (code && provider) {
                localStorage.removeItem('login_provider'); 
                
                if (provider === 'bnet') {
                    document.getElementById('bnetLoginBtn').innerText = "배틀넷 연동 중...";
                    // 💡 [수정 완료] 저장해 두었던 치지직 고유 식별자(chzzk_id)를 주소 뒤에 덧붙여 전송합니다.
                    const chzzkId = localStorage.getItem('chzzk_id') || '';
                    fetch(`https://hs-chzzk-tier-api.duckdns.org/api/bnet?code=${code}&state=${state}&chzzkId=${chzzkId}`)
                        .then(res => res.json())
                        .then(data => {
                            if (data.status === "success") {
                                localStorage.setItem('bnet_name', data.battletag);
                                window.location.reload(); 
                            } else {
                                alert("배틀넷 인증 실패: " + data.message);
                                document.getElementById('bnetLoginBtn').innerText = "2. 배틀넷 연동하기";
                            }
                        });
                } else if (provider === 'chzzk') {
                    document.getElementById('chzzkLoginBtn').innerText = "치지직 연동 중...";
                    fetch(`https://hs-chzzk-tier-api.duckdns.org/api/chzzk?code=${code}&state=${state}`)
                        .then(res => res.json())
                        .then(data => {
                            if (data.status === "success") {
                                localStorage.setItem('chzzk_name', data.nickname);
                                localStorage.setItem('chzzk_id', data.userIdHash); 
                                window.location.reload();
                            } else {
                                alert("치지직 인증 실패: " + data.message);
                                document.getElementById('chzzkLoginBtn').innerText = "1. 치지직 연동하기";
                            }
                        });
                }
            }
        };
    </script>
</body>
</html>
