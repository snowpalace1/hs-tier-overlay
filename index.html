<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하스스톤 티어 인증</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg text-center max-w-md w-full">
        <h1 class="text-3xl font-bold mb-4 text-blue-400">하스스톤 티어 인증</h1>
        <p class="text-gray-400 mb-8">치지직 방송 오버레이 연동을 위해<br>두 계정을 모두 로그인해 주세요.</p>
        
        <button class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded mb-4 transition duration-300">
            1. 치지직(네이버) 로그인
        </button>
        
        <button id="bnetLoginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition duration-300">
            2. 배틀넷 로그인
        </button>
        
        <p class="mt-6 text-sm text-gray-500">인증 후 치지직 채팅을 치면 티어가 표시됩니다!</p>
    </div>

    <script>
        // 배틀넷 버튼을 클릭했을 때 작동하는 엔진
        document.getElementById('bnetLoginBtn').addEventListener('click', function() {
            const clientId = '4a49c5289b9a42aba85056bb55c1154c'; 
            
            // 로그인 후 다시 돌아올 우리 웹페이지 주소
            const redirectUri = encodeURIComponent('https://snowpalace1.github.io/hs-tier-overlay/');
            
            // 블리자드 공식 인증 페이지로 향하는 전용 길 안내 링크
            const bnetAuthUrl = `https://oauth.battle.net/authorize?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=code&scope=openid`;
            
            // 사용자의 화면을 위의 링크로 이동
            window.location.href = bnetAuthUrl;
        });
    </script>
</body>
</html>
