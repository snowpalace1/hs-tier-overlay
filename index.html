<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하스스톤 티어 인증</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg text-center max-w-md w-full">
        <h1 class="text-3xl font-bold mb-4 text-blue-400">하스스톤 티어 인증</h1>
        <p class="text-gray-400 mb-8">치지직 방송 오버레이 연동을 위해<br>두 계정을 모두 로그인해 주세요.</p>
        
        <button id="naverLoginBtn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded mb-4 transition duration-300">
            1. 치지직(네이버) 로그인
        </button>
        
        <button id="bnetLoginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition duration-300">
            2. 배틀넷 로그인
        </button>

        <div id="resultArea" class="mt-6 hidden bg-gray-700 p-4 rounded-lg">
            <p id="naverResult" class="text-lg text-green-400 font-bold mb-2 hidden">✅ 치지직: <span id="naverDisplay" class="text-white"></span></p>
            <p id="bnetResult" class="text-lg text-blue-400 font-bold hidden">✅ 배틀넷: <span id="battletagDisplay" class="text-white"></span></p>
        </div>
        
        <p class="mt-6 text-sm text-gray-500">인증 후 치지직 채팅을 치면 티어가 표시됩니다!</p>
    </div>

    <script>
        const REDIRECT_URI = encodeURIComponent('https://snowpalace1.github.io/hs-tier-overlay/');
        
        document.getElementById('naverLoginBtn').addEventListener('click', function() {
            const naverClientId = 'kLCeM46CJDEtQ3gqVGfV'; 
            const stateString = Math.random().toString(36).substring(2, 15);
            localStorage.setItem('login_provider', 'naver');
            const naverAuthUrl = `https://nid.naver.com/oauth2.0/authorize?response_type=code&client_id=${naverClientId}&redirect_uri=${REDIRECT_URI}&state=${stateString}`;
            window.location.href = naverAuthUrl;
        });

        document.getElementById('bnetLoginBtn').addEventListener('click', function() {
            const bnetClientId = '4a49c5289b9a42aba85056bb55c1154c'; 
            const stateString = Math.random().toString(36).substring(2, 15);
            localStorage.setItem('login_provider', 'bnet');
            const bnetAuthUrl = `https://oauth.battle.net/authorize?client_id=${bnetClientId}&redirect_uri=${REDIRECT_URI}&response_type=code&scope=openid&state=${stateString}`;
            window.location.href = bnetAuthUrl;
        });

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const provider = localStorage.getItem('login_provider');
            
            // 🔥 [가장 핵심] 코드를 읽자마자 브라우저 주소창에서 흔적을 지워버립니다!
            if (code) {
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            
            const savedNaver = localStorage.getItem('naver_name');
            const savedBnet = localStorage.getItem('bnet_name');
            
            if (savedNaver || savedBnet) {
                document.getElementById('resultArea').classList.remove('hidden');
            }
            if (savedNaver) {
                document.getElementById('naverLoginBtn').style.display = 'none';
                document.getElementById('naverResult').classList.remove('hidden');
                document.getElementById('naverDisplay').innerText = savedNaver;
            }
            if (savedBnet) {
                document.getElementById('bnetLoginBtn').style.display = 'none';
                document.getElementById('bnetResult').classList.remove('hidden');
                document.getElementById('battletagDisplay').innerText = savedBnet;
            }
            
            if (code && provider) {
                localStorage.removeItem('login_provider'); 
                
                if (provider === 'bnet') {
                    document.getElementById('bnetLoginBtn').innerText = "배틀넷 연동 중...";
                    fetch(`https://hs-tier-overlay.vercel.app/api/index?code=${code}`)
                        .then(res => res.json())
                        .then(data => {
                            window.history.replaceState(null, '', window.location.pathname);
                            if (data.status === "success") {
                                localStorage.setItem('bnet_name', data.battletag);
                                window.location.reload(); 
                            } else {
                                alert("배틀넷 인증 실패: " + data.error);
                                document.getElementById('bnetLoginBtn').innerText = "2. 배틀넷 로그인";
                            }
                        });
                } else if (provider === 'naver') {
                    document.getElementById('naverLoginBtn').innerText = "네이버 연동 중...";
                    fetch(`http://131.186.2.217:8000/api/naver?code=${code}&state=${state}`)
                        .then(res => res.json())
                        .then(data => {
                            if (data.status === "success") {
                                localStorage.setItem('naver_name', data.nickname);
                                window.location.reload();
                            } else {
                                alert("네이버 인증 실패: " + data.error);
                                document.getElementById('naverLoginBtn').innerText = "1. 치지직(네이버) 로그인";
                            }
                        });
                }
            }
        };
    </script>
</body>
</html>
